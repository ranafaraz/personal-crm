name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/crm.dexdevs.com

            # Pull latest code
            git config --global --add safe.directory /var/www/crm.dexdevs.com
            git remote set-url origin git@github.com:ranafaraz/personal-crm.git
            git fetch origin main
            git reset --hard origin/main

            # Install/update PHP dependencies (no dev, optimized)
            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-interaction --no-dev --optimize-autoloader

            # Run any pending migrations
            php artisan migrate --force

            # Clear & re-cache everything
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Restart PHP-FPM to pick up new code
            systemctl restart php8.4-fpm

            # Signal queue workers to gracefully restart with new code
            php artisan queue:restart

            # Restart supervisor queue worker (try common program names; non-fatal)
            supervisorctl restart laravel-worker:* 2>/dev/null || \
            supervisorctl restart laravel-queue:* 2>/dev/null || \
            supervisorctl restart all 2>/dev/null || \
            systemctl restart laravel-queue 2>/dev/null || true

            # Re-dispatch any imports stuck in 'pending' (handles post-deploy queue restarts)
            php artisan tinker --no-interaction --execute="
            App\Models\ContactImport::where('status','pending')
                ->each(fn(\$i) => App\Jobs\ProcessContactImportJob::dispatch(\$i));
            App\Models\OpportunityImport::where('status','pending')
                ->each(fn(\$i) => App\Jobs\ProcessOpportunityImportJob::dispatch(\$i));
            echo 'Done.' . PHP_EOL;
            "

            echo "Deploy complete."
