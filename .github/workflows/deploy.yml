name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/crm.dexdevs.com

            # ── Pull latest code ──────────────────────────────────────
            git config --global --add safe.directory /var/www/crm.dexdevs.com
            git remote set-url origin git@github.com:ranafaraz/personal-crm.git
            git fetch origin main
            git reset --hard origin/main

            # ── PHP dependencies ──────────────────────────────────────
            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-interaction --no-dev --optimize-autoloader

            # ── Database migrations ───────────────────────────────────
            php artisan migrate --force

            # ── Rebuild all caches ────────────────────────────────────
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # ── Storage directory setup ───────────────────────────────
            mkdir -p storage/app/imports storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
            chown -R www-data:www-data storage/
            chmod -R 775 storage/
            php artisan storage:link --force 2>/dev/null || true

            # ── Restart web server ────────────────────────────────────
            systemctl restart php8.4-fpm

            # ── Queue worker: supervisor setup (non-fatal) ────────────
            set +e

            # Install supervisor if missing
            command -v supervisorctl >/dev/null 2>&1 || apt-get install -y supervisor >/dev/null 2>&1

            # Resolve full PHP binary path so supervisor can find it without $PATH tricks
            PHP_BIN=$(command -v php || which php || echo /usr/bin/php)

            # Write supervisor config using echo lines (avoids heredoc indentation issues in YAML)
            mkdir -p /etc/supervisor/conf.d
            {
              printf '[program:crm-queue]\n'
              printf 'process_name=%%(program_name)s_%%(process_num)02d\n'
              printf "command=$PHP_BIN /var/www/crm.dexdevs.com/artisan queue:work database --sleep=3 --tries=1 --timeout=600 --max-time=3600\n"
              printf 'directory=/var/www/crm.dexdevs.com\n'
              printf 'autostart=true\n'
              printf 'autorestart=true\n'
              printf 'user=root\n'
              printf 'numprocs=1\n'
              printf 'redirect_stderr=true\n'
              printf 'stdout_logfile=/var/log/crm-queue.log\n'
              printf 'stopwaitsecs=3600\n'
              printf 'environment=PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"\n'
            } > /etc/supervisor/conf.d/crm-queue.conf

            # Ensure supervisord is running, then reload config
            service supervisor start 2>/dev/null || true
            supervisorctl reread 2>/dev/null || true
            supervisorctl update 2>/dev/null || true

            # Signal running workers to gracefully restart with new code
            php artisan queue:restart 2>/dev/null || true

            # Restart (or start) the crm-queue worker
            supervisorctl restart crm-queue:* 2>/dev/null || supervisorctl start crm-queue:* 2>/dev/null || true
            supervisorctl status crm-queue:* 2>/dev/null || true

            # ── Show recent import errors from Laravel log ────────────
            echo "=== Recent import-related log entries ==="
            grep -h "ContactImport\|ProcessContactImport\|CsvImport\|parseAndStore" \
              /var/www/crm.dexdevs.com/storage/logs/laravel.log 2>/dev/null | tail -30 || true
            echo "==="

            # ── Process any pending imports right now ─────────────────
            php artisan queue:work \
              --stop-when-empty \
              --timeout=600 \
              --tries=1 \
              --max-jobs=200 \
              2>/dev/null || true

            set -e
            # ─────────────────────────────────────────────────────────
            echo "Deploy complete."
