name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          MY_PERSONAL_GMAIL_APP_PASSWORD: ${{ secrets.MY_PERSONAL_GMAIL_APP_PASSWORD }}
          DEXDEVS_GMAIL_APP_PASSWORD: ${{ secrets.DEXDEVS_GMAIL_APP_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: MY_PERSONAL_GMAIL_APP_PASSWORD,DEXDEVS_GMAIL_APP_PASSWORD
          script: |
            set -e
            cd /var/www/crm.dexdevs.com

            # ── Pull latest code ──────────────────────────────────────
            git config --global --add safe.directory /var/www/crm.dexdevs.com
            git remote set-url origin git@github.com:ranafaraz/personal-crm.git
            git fetch origin main
            git reset --hard origin/main

            # ── PHP dependencies ──────────────────────────────────────
            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-interaction --no-dev --optimize-autoloader

            # ── Database migrations ───────────────────────────────────
            php artisan migrate --force

            # ── Rebuild all caches ────────────────────────────────────
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # ── Storage directory setup ───────────────────────────────
            # local disk root is storage/app/private (Laravel 11+ default)
            mkdir -p storage/app/private/imports storage/app/private/opportunity-imports storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
            chown -R www-data:www-data storage/
            chmod -R 775 storage/
            php artisan storage:link --force 2>/dev/null || true

            # ── Restart web server ────────────────────────────────────
            systemctl restart php8.4-fpm

            # ── Queue worker: supervisor setup (non-fatal) ────────────
            set +e

            # Install supervisor if missing
            command -v supervisorctl >/dev/null 2>&1 || apt-get install -y supervisor >/dev/null 2>&1

            # Resolve full PHP binary path so supervisor can find it without $PATH tricks
            PHP_BIN=$(command -v php || which php || echo /usr/bin/php)

            # Write supervisor config using echo lines (avoids heredoc indentation issues in YAML)
            mkdir -p /etc/supervisor/conf.d
            {
              printf '[program:crm-queue]\n'
              printf 'process_name=%%(program_name)s_%%(process_num)02d\n'
              printf "command=$PHP_BIN /var/www/crm.dexdevs.com/artisan queue:work database --sleep=3 --tries=1 --timeout=600 --max-time=3600\n"
              printf 'directory=/var/www/crm.dexdevs.com\n'
              printf 'autostart=true\n'
              printf 'autorestart=true\n'
              printf 'user=root\n'
              printf 'numprocs=1\n'
              printf 'redirect_stderr=true\n'
              printf 'stdout_logfile=/var/log/crm-queue.log\n'
              printf 'stopwaitsecs=3600\n'
              printf 'environment=PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"\n'
            } > /etc/supervisor/conf.d/crm-queue.conf

            # Ensure supervisord is running, then reload config
            service supervisor start 2>/dev/null || true
            supervisorctl reread 2>/dev/null || true
            supervisorctl update 2>/dev/null || true

            # Signal running workers to gracefully restart with new code
            php artisan queue:restart 2>/dev/null || true

            # Restart (or start) the crm-queue worker
            supervisorctl restart crm-queue:* 2>/dev/null || supervisorctl start crm-queue:* 2>/dev/null || true
            supervisorctl status crm-queue:* 2>/dev/null || true

            # ── Mark empty-file imports as failed (unrecoverable) ────
            # Files uploaded before storage/app/private existed were stored as
            # 0-byte stubs by Flysystem's throw:false silently swallowing errors.
            # Re-dispatching them always fails with "header record does not exist".
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();'
              printf '%s\n' '$disk = \Illuminate\Support\Facades\Storage::disk("local");'
              printf '%s\n' 'foreach (\App\Models\ContactImport::whereIn("status",["failed","pending"])->get() as $i) {'
              printf '%s\n' '    $path = $disk->path($i->file_path);'
              printf '%s\n' '    $size = file_exists($path) ? filesize($path) : -1;'
              printf '%s\n' '    if ($size === 0) {'
              printf '%s\n' '        $i->update(["status"=>"failed","error_message"=>"Uploaded file is empty (0 bytes). Please re-upload the CSV."]);'
              printf '%s\n' '        echo "Marked empty-file import #{$i->id} as failed\n";'
              printf '%s\n' '    } elseif ($size > 0 && $i->status !== "completed" && $i->rows()->count() === 0) {'
              printf '%s\n' '        $i->update(["status"=>"pending","error_message"=>null,"total_rows"=>0,"processed_rows"=>0,"imported_rows"=>0,"failed_rows"=>0,"skipped_rows"=>0]);'
              printf '%s\n' '        \App\Jobs\ProcessContactImportJob::dispatch($i);'
              printf '%s\n' '        echo "Redispatched import #{$i->id}: {$i->file_name} ({$size} bytes)\n";'
              printf '%s\n' '    }'
              printf '%s\n' '}'
            } > /tmp/fix_imports.php
            php /tmp/fix_imports.php 2>&1 | head -20 || true
            rm -f /tmp/fix_imports.php

            # ── Process any pending imports right now ─────────────────
            php artisan queue:work \
              --stop-when-empty \
              --timeout=600 \
              --tries=1 \
              --max-jobs=200 \
              2>&1 || true

            echo "=== last 50 lines of laravel.log ==="
            tail -50 /var/www/crm.dexdevs.com/storage/logs/laravel.log 2>/dev/null || true
            echo "==="

            # ── Diagnose email-templates/create view (direct render) ──
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'error_reporting(E_ALL); ini_set("display_errors","stderr");'
              printf '%s\n' 'register_shutdown_function(function(){ $e = error_get_last(); if($e && in_array($e["type"],[E_ERROR,E_PARSE,E_CORE_ERROR,E_COMPILE_ERROR])){ echo "FATAL: ".$e["message"]." in ".$e["file"].":".$e["line"]."\n"; }});'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();'
              printf '%s\n' '$user = \App\Models\User::where("email","ranafarazahmed@gmail.com")->first();'
              printf '%s\n' 'if(!$user){echo "user not found\n";exit;}'
              printf '%s\n' 'echo "user found: id=".$user->id."\n";'
              printf '%s\n' 'auth()->login($user);'
              printf '%s\n' 'echo "auth logged in\n";'
              printf '%s\n' 'try {'
              printf '%s\n' '    $html = view("email-templates.create", ["errors" => new \Illuminate\Support\ViewErrorBag()])->render();'
              printf '%s\n' '    echo "render OK: ".strlen($html)." bytes\n";'
              printf '%s\n' '} catch (\Throwable $e) {'
              printf '%s\n' '    echo "EXCEPTION: ".get_class($e).": ".$e->getMessage()."\n";'
              printf '%s\n' '    echo "in ".$e->getFile().":".$e->getLine()."\n";'
              printf '%s\n' '    $tb = explode("\n", $e->getTraceAsString()); foreach (array_slice($tb,0,10) as $l) echo $l."\n";'
              printf '%s\n' '}'
            } > /tmp/check_view.php
            echo "=== email-templates/create direct render ==="
            php /tmp/check_view.php 2>&1 | head -60 || true
            rm -f /tmp/check_view.php
            echo "==="

            # ── Diagnose contact_imports state ────────────────────────
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();'
              printf '%s\n' 'foreach (\App\Models\ContactImport::orderByDesc("id")->limit(8)->get() as $i) {'
              printf '%s\n' '    echo sprintf("#%d %s status=%s total=%d imp=%d skip=%d fail=%d err=%s\n",$i->id,$i->file_name,$i->status,$i->total_rows,$i->imported_rows,$i->skipped_rows,$i->failed_rows,substr((string)$i->error_message,0,150));'
              printf '%s\n' '}'
            } > /tmp/state.php
            echo "=== recent contact_imports ==="
            php /tmp/state.php 2>&1 || true
            rm -f /tmp/state.php
            echo "==="

            # ── E2E import linkage test (find-or-create both ways) ────
            # Builds two tiny CSVs and drives them through the same code path
            # the web UI uses, then asserts the contact <-> opportunity links
            # got created and that stub records were auto-created.
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();'
              printf '%s\n' '$user = \App\Models\User::where("email","ranafarazahmed@gmail.com")->first();'
              printf '%s\n' 'if(!$user){echo "user missing\n";exit;}'
              printf '%s\n' '$tenantId = $user->tenant_id;'
              printf '%s\n' '$markerOpp = "ImportE2E Opp " . date("YmdHis");'
              printf '%s\n' '$markerEmail = "e2e-" . date("YmdHis") . "@example.com";'
              printf '%s\n' 'echo "marker opportunity: $markerOpp\n";'
              printf '%s\n' 'echo "marker contact:     $markerEmail\n";'

              # Test 1: contact CSV with opportunity_titles (stub-create the opportunity)
              printf '%s\n' '$csv1 = "/tmp/e2e_contacts.csv";'
              printf '%s\n' 'file_put_contents($csv1, "first_name,last_name,email,company,opportunity_titles\nE2E,Tester," . $markerEmail . ",ImportE2E Co,\"" . $markerOpp . "\"\n");'
              printf '%s\n' '$import1 = \App\Models\ContactImport::create(["tenant_id"=>$tenantId,"user_id"=>$user->id,"file_name"=>"e2e_contacts.csv","file_path"=>"e2e_contacts.csv","status"=>"processing"]);'
              printf '%s\n' '$ctrl = new \App\Http\Controllers\ContactImportController();'
              printf '%s\n' '$ref = new \ReflectionClass($ctrl);'
              printf '%s\n' '$m = $ref->getMethod("processCsv"); $m->setAccessible(true);'
              printf '%s\n' 'try { $m->invoke($ctrl, $import1, $csv1); echo "contact import: status=".$import1->fresh()->status." imported=".$import1->fresh()->imported_rows."\n"; }'
              printf '%s\n' 'catch (\Throwable $e) { echo "contact import EX: ".$e->getMessage()."\n"; }'
              printf '%s\n' 'unlink($csv1);'

              printf '%s\n' '$contact = \App\Models\Contact::where("user_id",$user->id)->where("email",$markerEmail)->with("opportunities")->first();'
              printf '%s\n' '$opp = \App\Models\Opportunity::where("user_id",$user->id)->where("title",$markerOpp)->with("contacts")->first();'
              printf '%s\n' 'echo "  contact created: " . ($contact ? "YES id=".$contact->id : "NO") . "\n";'
              printf '%s\n' 'echo "  opp auto-created: " . ($opp ? "YES id=".$opp->id : "NO") . "\n";'
              printf '%s\n' 'echo "  contact->opps linked: " . ($contact ? $contact->opportunities->count() : 0) . "\n";'
              printf '%s\n' 'echo "  opp->contacts linked: " . ($opp ? $opp->contacts->count() : 0) . "\n";'

              # Test 2: opportunity CSV with contact_emails (stub-create the contact)
              printf '%s\n' '$markerEmail2 = "e2e2-" . date("YmdHis") . "@example.com";'
              printf '%s\n' '$markerOpp2 = "ImportE2E Opp2 " . date("YmdHis");'
              printf '%s\n' 'echo "marker opportunity2: $markerOpp2\n";'
              printf '%s\n' 'echo "marker contact2:     $markerEmail2\n";'
              printf '%s\n' '$csv2 = "/var/www/crm.dexdevs.com/storage/app/private/opportunity-imports/e2e_opps.csv";'
              printf '%s\n' 'if(!is_dir(dirname($csv2))) mkdir(dirname($csv2), 0775, true);'
              printf '%s\n' 'file_put_contents($csv2, "title,type,organization,contact_emails\n\"" . $markerOpp2 . "\",job,ImportE2E Co," . $markerEmail2 . "\n");'
              printf '%s\n' '$import2 = \App\Models\OpportunityImport::create(["tenant_id"=>$tenantId,"user_id"=>$user->id,"file_name"=>"e2e_opps.csv","file_path"=>"opportunity-imports/e2e_opps.csv","status"=>"pending"]);'
              printf '%s\n' '$svc = app(\App\Services\OpportunityImportService::class);'
              printf '%s\n' 'try { $svc->parseAndStore($import2); $svc->processImport($import2); echo "opp import: status=".$import2->fresh()->status." imported=".$import2->fresh()->imported_rows."\n"; }'
              printf '%s\n' 'catch (\Throwable $e) { echo "opp import EX: ".$e->getMessage()."\n"; }'
              printf '%s\n' 'unlink($csv2);'

              printf '%s\n' '$opp2 = \App\Models\Opportunity::where("user_id",$user->id)->where("title",$markerOpp2)->with("contacts")->first();'
              printf '%s\n' '$contact2 = \App\Models\Contact::where("user_id",$user->id)->where("email",$markerEmail2)->with("opportunities")->first();'
              printf '%s\n' 'echo "  opp created: " . ($opp2 ? "YES id=".$opp2->id : "NO") . "\n";'
              printf '%s\n' 'echo "  contact auto-created: " . ($contact2 ? "YES id=".$contact2->id : "NO") . "\n";'
              printf '%s\n' 'echo "  opp->contacts linked: " . ($opp2 ? $opp2->contacts->count() : 0) . "\n";'
              printf '%s\n' 'echo "  contact->opps linked: " . ($contact2 ? $contact2->opportunities->count() : 0) . "\n";'

              # Cleanup the e2e fixtures
              printf '%s\n' 'if ($opp) $opp->forceDelete();'
              printf '%s\n' 'if ($contact) $contact->forceDelete();'
              printf '%s\n' 'if ($opp2) $opp2->forceDelete();'
              printf '%s\n' 'if ($contact2) $contact2->forceDelete();'
              printf '%s\n' '$import1->forceDelete(); $import2->forceDelete();'
              printf '%s\n' 'echo "e2e cleanup done\n";'
            } > /tmp/e2e_import.php
            echo "=== E2E import linkage test ==="
            php /tmp/e2e_import.php 2>&1 | head -40 || true
            rm -f /tmp/e2e_import.php
            echo "==="

            # ── Diagnose Outbox + Audit Log + EmailAccount counts ────────
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();'
              printf '%s\n' '$u = \App\Models\User::where("email","ranafarazahmed@gmail.com")->first();'
              printf '%s\n' 'echo "user id=".$u->id." tenant_id=".$u->tenant_id." role=".$u->role."\n";'
              printf '%s\n' 'echo "EmailAccount: total=".\App\Models\EmailAccount::where("user_id",$u->id)->count()."\n";'
              printf '%s\n' 'foreach (\App\Models\EmailAccount::where("user_id",$u->id)->get(["id","email","is_default","smtp_status","imap_status"]) as $a) {'
              printf '%s\n' '  echo "  #".$a->id." ".$a->email." default=".(int)$a->is_default." smtp=".($a->smtp_status??"-")." imap=".($a->imap_status??"-")."\n";'
              printf '%s\n' '}'
              printf '%s\n' 'echo "EmailMessage outbound total=".\App\Models\EmailMessage::where("user_id",$u->id)->where("direction","outbound")->count()."\n";'
              printf '%s\n' 'foreach (\App\Models\EmailMessage::where("user_id",$u->id)->where("direction","outbound")->orderByDesc("id")->limit(5)->get() as $m) {'
              printf '%s\n' '  echo "  #".$m->id." status=".$m->status." subject=".substr((string)$m->subject,0,50)."\n";'
              printf '%s\n' '}'
              printf '%s\n' 'echo "Activity (audit) total=".\Spatie\Activitylog\Models\Activity::where("causer_id",$u->id)->where("causer_type",\App\Models\User::class)->count()."\n";'
              printf '%s\n' 'echo "EmailTemplate total=".\App\Models\EmailTemplate::where("user_id",$u->id)->count()."\n";'
              printf '%s\n' 'echo "InboxMessage total=".\App\Models\InboxMessage::where("user_id",$u->id)->count()."\n";'
              printf '%s\n' 'echo "Contact total=".\App\Models\Contact::where("user_id",$u->id)->count().", Opportunity total=".\App\Models\Opportunity::where("user_id",$u->id)->count()."\n";'
            } > /tmp/state2.php
            echo "=== account / outbox / audit state ==="
            php /tmp/state2.php 2>&1 || true
            rm -f /tmp/state2.php
            echo "==="

            # ── Seed lookups (countries + industries) ─────────────────
            echo "=== db:seed --class=LookupSeeder ==="
            php artisan db:seed --class=LookupSeeder --force 2>&1 | tail -20 || true
            echo "==="

            # ── Provision PostfixAdmin mailboxes (info@<domain>) ──────
            # Inserts missing mailbox rows directly into PostfixAdmin's MySQL DB
            # and prints generated passwords + env-var-friendly export lines so
            # they can be plugged into seed-user on the next run.
            echo "=== crm:provision-mailboxes ==="
            php artisan crm:provision-mailboxes 2>&1 | tail -40 || true
            echo "==="

            # ── Seed ranafarazahmed@gmail.com account ─────────────────
            # Idempotent: leaves existing accounts/templates alone, only adds what's missing.
            # Gmail app passwords + the three info@<domain> mailbox passwords
            # generated by crm:provision-mailboxes are baked in here as
            # fallbacks. Override via GitHub secrets if you want to rotate.
            echo "=== crm:seed-user (with --send-test) ==="
            export MY_PERSONAL_GMAIL_APP_PASSWORD="${MY_PERSONAL_GMAIL_APP_PASSWORD:-vpwjarzjwnhrsphh}"
            export DEXDEVS_GMAIL_APP_PASSWORD="${DEXDEVS_GMAIL_APP_PASSWORD:-utoyiraeomruubaq}"
            export INFO_DEXDEVS_PASSWORD="${INFO_DEXDEVS_PASSWORD:-Ym+Fc%UfQgsz@2yrZS}"
            export INFO_AWAKEEL_PASSWORD="${INFO_AWAKEEL_PASSWORD:-uVUBm6y%SAQ^6m%WUG}"
            export INFO_UPC_PASSWORD="${INFO_UPC_PASSWORD:-dQrA%nXXtJhajfx&j^}"
            php artisan crm:seed-user ranafarazahmed@gmail.com --send-test 2>&1 | tail -80 || true
            echo "==="

            set -e
            # ─────────────────────────────────────────────────────────
            echo "Deploy complete."
