name: Debug Upload Endpoints

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Run upload diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/crm.dexdevs.com

            echo "=== Ownership / route diagnostics ==="
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();'
              printf '%s\n' '$user = \App\Models\User::where("email","ranafarazahmed@gmail.com")->first();'
              printf '%s\n' 'echo "user_id=".$user->id." tenant_id=".$user->tenant_id."\n";'
              printf '%s\n' '$opp = \App\Models\Opportunity::find(285);'
              printf '%s\n' 'echo "opp285: ".($opp ? ("user_id=".$opp->user_id." tenant_id=".$opp->tenant_id) : "NOT FOUND")."\n";'
              printf '%s\n' '$contact = \App\Models\Contact::find(209);'
              printf '%s\n' 'echo "contact209: ".($contact ? ("user_id=".$contact->user_id." tenant_id=".$contact->tenant_id) : "NOT FOUND")."\n";'
              printf '%s\n' '$email = \App\Models\EmailMessage::find(519);'
              printf '%s\n' 'echo "email519: ".($email ? ("user_id=".$email->user_id." tenant_id=".$email->tenant_id) : "NOT FOUND")."\n";'
              printf '%s\n' '$fu = \App\Models\FollowUp::find(14);'
              printf '%s\n' 'echo "followup14: ".($fu ? ("user_id=".$fu->user_id." tenant_id=".$fu->tenant_id) : "NOT FOUND")."\n";'
              printf '%s\n' 'foreach (["opportunities.show","contacts.show","emails.show","follow-ups.show"] as $name) {'
              printf '%s\n' '    $route = \Illuminate\Support\Facades\Route::getRoutes()->getByName($name);'
              printf '%s\n' '    echo "$name => ".($route ? ($route->uri()." [".implode(",", $route->middleware())."]") : "MISSING")."\n";'
              printf '%s\n' '}'
            } > /tmp/diag2.php
            php /tmp/diag2.php
            rm -f /tmp/diag2.php

            echo "Done."
