name: Check App Logs

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get recent error logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            tail -200 /var/www/crm.dexdevs.com/storage/logs/laravel.log | grep -B2 -A30 "ERROR\|CRITICAL" | tail -100
