services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    networks:
      - crm

  nginx:
    image: nginx:1.27-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - crm

  db:
    image: mariadb:11
    container_name: crm_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-crm_local}
      MYSQL_USER: ${DB_USERNAME:-crm_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-crm_local_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    volumes:
      - crm_db:/var/lib/mysql
    ports:
      - "${DB_EXPOSE_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --backoff=60 --timeout=90
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    networks:
      - crm

volumes:
  crm_db:

networks:
  crm:
    driver: bridge
